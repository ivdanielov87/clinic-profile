<header class="navbar" [class.navbar--scrolled]="scrolled()">
  <div class="navbar__container">
    <a class="navbar__logo" (click)="scrollTo('hero')" role="button" aria-label="Начало">
      <span class="navbar__logo-icon" aria-hidden="true">
        <svg width="38" height="28" viewBox="0 0 38 28" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M 2,14 C 9,3 29,3 36,14" stroke="#1B2E4B" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <path d="M 2,14 C 9,25 29,25 36,14" stroke="#1B2E4B" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <circle cx="19" cy="14" r="7.2" stroke="#1B2E4B" stroke-width="1.2" fill="none"/>
          <circle cx="19" cy="14" r="3.4" fill="#1B2E4B"/>
          <circle cx="20.8" cy="12.2" r="1.1" fill="white"/>
        </svg>
      </span>
      <span class="navbar__logo-text">
        <span class="navbar__logo-name">Д-р Магдалена Младенова</span>
        <span class="navbar__logo-sub">ОЧЕН КАБИНЕТ &middot; РУСЕ</span>
      </span>
    </a>

    <nav class="navbar__nav" aria-label="Основна навигация">
      <ul class="navbar__links">
        @for (link of navLinks; track link.anchor) {
          <li>
            <button class="navbar__link" (click)="scrollTo(link.anchor)">
              {{ link.label }}
            </button>
          </li>
        }
      </ul>
    </nav>

    <div class="navbar__phone-wrap">
      <button
        type="button"
        class="navbar__phone-btn"
        [class.navbar__phone-btn--open]="phoneOpen()"
        (click)="togglePhone()"
        aria-label="Телефон за връзка"
        [attr.aria-expanded]="phoneOpen()"
      >
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path
            d="M3.5 2.5H6.5L8 6L6 7.25C6.9 9.15 8.85 11.1 10.75 12L12 10L15.5 11.5V14.5C15.5 15.328 14.828 16 14 16C7.65 16 2 10.35 2 4C2 3.172 2.672 2.5 3.5 2.5Z"
            stroke="currentColor"
            stroke-width="1.4"
            stroke-linejoin="round"
          />
        </svg>
      </button>

      @if (phoneOpen()) {
        <div class="navbar__phone-pop" role="dialog" aria-label="Контакт по телефон">
          <span class="navbar__phone-pop-label">Телефон за връзка</span>
          <span class="navbar__phone-pop-number-row">
            <a class="navbar__phone-pop-number" [href]="phoneHref()">{{ phone() }}</a>
            <button
              type="button"
              class="navbar__phone-pop-copy"
              [class.navbar__phone-pop-copy--success]="phoneCopied()"
              (click)="copyPhone()"
              [attr.aria-label]="phoneCopied() ? 'Копирано' : 'Копирай телефона'"
            >
              @if (phoneCopied()) {
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <path d="M3 8.5L6.5 12L13 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              } @else {
                <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                  <rect x="5" y="5" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
                  <path d="M11 5V3.5A1.5 1.5 0 0 0 9.5 2H3.5A1.5 1.5 0 0 0 2 3.5v6A1.5 1.5 0 0 0 3.5 11H5" stroke="currentColor" stroke-width="1.3"/>
                </svg>
              }
            </button>
          </span>
          <p class="navbar__phone-pop-text">
            Обадете се за въпроси, уточнение на час или консултация.
          </p>
          <button
            type="button"
            class="navbar__phone-pop-link"
            (click)="scrollTo('booking')"
          >
            Всички контакти
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none" aria-hidden="true">
              <path d="M3.5 2.5L7 6L3.5 9.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      }
    </div>

    <a class="navbar__cta" [href]="superDocUrl()" target="_blank" rel="noopener noreferrer">
      ЗАПИШЕТЕ ЧАС
    </a>

    <button
      class="navbar__hamburger"
      [class.navbar__hamburger--open]="menuOpen()"
      (click)="toggleMenu()"
      aria-label="Меню"
      [attr.aria-expanded]="menuOpen()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>

  <div class="navbar__mobile" [class.navbar__mobile--open]="menuOpen()">
    <nav>
      <ul class="navbar__mobile-links">
        @for (link of navLinks; track link.anchor) {
          <li>
            <button class="navbar__mobile-link" (click)="scrollTo(link.anchor)">
              {{ link.label }}
            </button>
          </li>
        }
      </ul>
    </nav>
    <a class="navbar__mobile-cta" [href]="superDocUrl()" target="_blank" rel="noopener noreferrer">
      ЗАПИШЕТЕ ЧАС
    </a>
  </div>
</header>
